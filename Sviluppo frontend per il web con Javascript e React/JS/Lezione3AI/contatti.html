<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --ink: #212529;
            --cream: #f3efe7;
            --slate: #1f2a36;
            --accent: #d5a85f;
        }

        body {
            font-family: "Source Sans 3", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top, #ffffff 0%, var(--cream) 55%, #ece5d8 100%);
        }

        h1,
        h2 {
            font-family: "Playfair Display", serif;
        }

        .sidebar {
            background: linear-gradient(180deg, #101820 0%, var(--slate) 100%);
            min-height: 100vh;
        }

        .sidebar .navbar-brand {
            font-family: "Playfair Display", serif;
            letter-spacing: 0.5px;
        }

        .sidebar-nav .nav-link {
            border-radius: 0.5rem;
            padding: 0.55rem 0.85rem;
            color: #f8f9fa;
        }

        .sidebar-nav .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.12);
        }

        .sidebar-nav .nav-link.active {
            background-color: rgba(255, 255, 255, 0.22);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
        }

        .hero {
            background: linear-gradient(120deg, #2c3a47 0%, #3d4f60 100%);
            border-bottom: 4px solid var(--accent);
        }

        .content-area {
            padding-bottom: 64px;
        }
    </style>
    <title>Contatti - Citta</title>
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <div class="container-fluid flex-grow-1">
        <div class="row min-vh-100">
            <aside class="col-md-3 col-lg-2 sidebar text-white p-3">
                <a class="navbar-brand d-flex align-items-center gap-2 text-white text-decoration-none"
                    href="index.html">
                    <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=60&q=80"
                        alt="Logo Cities" width="28" height="28" class="rounded-circle">
                    <span>Cities</span>
                </a>
                <nav class="nav flex-column mt-4 sidebar-nav">
                    <a class="nav-link text-white" href="index.html">London</a>
                    <a class="nav-link text-white" href="paris.html">Paris</a>
                    <a class="nav-link text-white" href="tokyo.html">Tokyo</a>
                    <a class="nav-link text-white fw-semibold active" aria-current="page"
                        href="contatti.html">Contatti</a>
                </nav>
            </aside>
            <main class="col-md-9 col-lg-10 p-0 d-flex flex-column content-area">
                <section class="py-5 text-white px-4 hero">
                    <h1 class="mb-0">Contatti</h1>
                    <p class="mb-0">Mettiti in contatto con noi</p>
                </section>
                <div class="container my-5 flex-grow-1">
                    <form action="https://www.w3schools.com/action_page.php" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nome <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="mb-3">
                            <label for="messaggio" class="form-label">Messaggio <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="messaggio" name="messaggio" rows="4" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="citta" class="form-label">Quale città preferiresti visitare? <span class="text-danger">*</span></label>
                            <select class="form-select" id="citta" name="citta" required>
                                <option value="">Seleziona una città</option>
                                <option value="London">London</option>
                                <option value="Paris">Paris</option>
                                <option value="Tokyo">Tokyo</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Sesso <span class="text-danger">*</span></label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sesso" id="maschio" value="maschio" required>
                                    <label class="form-check-label" for="maschio">Maschio</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sesso" id="femmina" value="femmina" required>
                                    <label class="form-check-label" for="femmina">Femmina</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="sesso" id="altro" value="altro" required>
                                    <label class="form-check-label" for="altro">Altro</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="umano" name="umano" value="si" required>
                                <label class="form-check-label" for="umano">
                                    Sono umano <span class="text-danger">*</span>
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <button type="submit" class="btn btn-dark">Invia</button>
                            <button type="reset" class="btn btn-outline-secondary ms-2">Cancella</button>
                        </div>
                    </form>

                </div>
            </main>
        </div>
    </div>
    <footer class="bg-dark text-white py-2 position-fixed bottom-0 start-0 w-100">
        <div class="container text-center">
            <p class="mb-0">Samuele Mesoraca - Copyright @2026</p>
        </div>
    </footer>
</body>

</html>
