<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <div class="container mt-5" id="logindash">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Accesso Riservato</h3>

                        <div class="mb-3">
                            <label class="form-label text-muted">Username</label>
                            <input id="username" type="text" class="form-control" placeholder="Es: emilys">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted">Password</label>
                            <input id="password" type="password" class="form-control" placeholder="Es: emilyspass">
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg" id="login">Accedi alla Dashboard</button>
                        </div>

                        <div class="mt-3 text-danger text-center fw-bold text-error"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dash" class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary-subtle">
            <h2 class="text-primary m-0">📦 Product Manager</h2>
            <button class="btn btn-outline-danger btn-sm" id="logout">Esci (Logout)</button>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Aggiungi Prodotto</h5>
                    </div>
                    <div class="card-body p-3">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Titolo</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Descrizione</label>
                            <textarea class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Prezzo (€)</label>
                            <input type="number" class="form-control">
                        </div>
                        <button class="btn btn-success w-100">Salva Prodotto</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body d-flex gap-2 p-3">
                        <input type="text" class="form-control" placeholder="Cerca un prodotto per nome...">
                        <button class="btn btn-dark text-nowrap px-4">Cerca</button>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Catalogo Prodotti</h5>
                        <span class="badge bg-secondary">Totale in lista: <span class="counter">0</span></span>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush">

                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
</body>

</html>
